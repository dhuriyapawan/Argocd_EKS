name: Deploy to EKS

on:
  push:
    branches: 
        - featureB

jobs:
  aws-login:
    name: AWS Login
    runs-on: ubuntu-latest

    env:
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show username (debug)
        run: echo "Username is $USERNAME"