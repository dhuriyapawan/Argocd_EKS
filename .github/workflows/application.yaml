name: Deploy to EKS

on:
  push:
    branches:
      - featureB

jobs:
  terraform:
    name: Provision Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.USERNAME }}
          aws-secret-access-key: ${{ secrets.PASSWORD }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve 
        working-directory: ./terraform

  deploy:
    name: Build & Deploy App
    runs-on: ubuntu-latest
    needs: terraform   # ⬅️ important

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.USERNAME }}
          aws-secret-access-key: ${{ secrets.PASSWORD }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Ensure ECR repo exists
        run: |
          aws ecr describe-repositories --repository-names my-app || \
          aws ecr create-repository --repository-name my-app

      - name: Build Docker image
        run: |
          docker build -t my-app .
          docker tag my-app:latest 599548906743.dkr.ecr.us-east-1.amazonaws.com/my-app:latest

      - name: Push Docker image
        run: |
          docker push 599548906743.dkr.ecr.us-east-1.amazonaws.com/my-app:latest

      - name: Wait for EKS to be ready
        run: |
          aws eks wait cluster-active --name my-eks-cluster --region us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name my-eks-cluster

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl rollout status deployment/my-app-deployment